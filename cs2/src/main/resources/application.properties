spring.application.name=BankSystem
server.port=8081

# JWT
app.jwt.secret=clinicAppSecretKeyForJWTTokenGeneration2026012345
app.jwt.expiration=30000

spring.datasource.url=jdbc:mysql://localhost:3306/bank_system
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate: genera las tablas a partir de las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/bank_system

// Configuracion de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.packagesToScan=app.application.api.controllers